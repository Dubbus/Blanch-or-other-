services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blanch
      POSTGRES_USER: blanch
      POSTGRES_PASSWORD: blanch_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blanch"]
      interval: 5s
      retries: 10

  api:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+asyncpg://blanch:blanch_dev@db:5432/blanch
      SECRET_KEY: dev-secret-key-change-in-production
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081"
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blanch.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    profiles:
      - tools

volumes:
  pgdata:
