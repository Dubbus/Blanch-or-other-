name: Blanch
options:
  bundleIdPrefix: com.blanch
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.4"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  Blanch:
    type: application
    platform: iOS
    sources:
      - path: Blanch
    settings:
      base:
        INFOPLIST_FILE: Blanch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.blanch.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Blanch/Info.plist
      properties:
        CFBundleDisplayName: Blanch
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCameraUsageDescription: "Blanch needs camera access to analyze your skin tone for color season matching."
        ITSAppUsesNonExemptEncryption: false
